<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sport Booking — Réservation de terrains</title>
  <meta name="description" content="Réservez vos terrains de Padel et Football en quelques clics" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <style>
    /* ── Reset ──────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* ── Cloud Dancer 2026 palette ─── */
      --bg: #f5f3f0;
      --bg2: #edeae6;
      --surface: rgba(0, 0, 0, 0.03);
      --surface-hover: rgba(0, 0, 0, 0.06);
      --glass: rgba(255, 255, 255, 0.7);
      --glass-border: rgba(0, 0, 0, 0.08);
      --glass-border-hover: rgba(0, 0, 0, 0.15);
      --text: #1a1a2e;
      --text-muted: #6b6e7a;
      --text-dim: #a0a3ad;
      --accent: #5b4a8a;
      --accent-light: #7b6baa;
      --accent-glow: rgba(91, 74, 138, 0.2);
      --padel: #2a9d8f;
      --padel-bg: rgba(42, 157, 143, 0.1);
      --padel-border: rgba(42, 157, 143, 0.25);
      --foot: #c97d3a;
      --foot-bg: rgba(201, 125, 58, 0.1);
      --foot-border: rgba(201, 125, 58, 0.25);
      --danger: #c0392b;
      --success: #27ae60;
      --success-bg: rgba(39, 174, 96, 0.1);
      --radius: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollbar styling ──────────────────────────────── */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(0, 0, 0, 0.12);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 0, 0, 0.2);
    }

    /* ── Animated BG ───────────────────────────────────── */
    .bg-glow {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .bg-glow .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: orbFloat 18s ease-in-out infinite alternate;
    }

    .bg-glow .orb:nth-child(1) {
      width: 500px;
      height: 500px;
      top: -10%;
      left: 10%;
      background: rgba(91, 74, 138, 0.08);
    }

    .bg-glow .orb:nth-child(2) {
      width: 400px;
      height: 400px;
      bottom: 10%;
      right: 5%;
      background: rgba(42, 157, 143, 0.06);
      animation-delay: -6s;
    }

    .bg-glow .orb:nth-child(3) {
      width: 350px;
      height: 350px;
      top: 40%;
      left: 50%;
      background: rgba(201, 125, 58, 0.05);
      animation-delay: -12s;
    }

    @keyframes orbFloat {
      0% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(30px, -40px) scale(1.1);
      }

      100% {
        transform: translate(-20px, 20px) scale(0.95);
      }
    }

    /* ── Container ─────────────────────────────────────── */
    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      padding: 40px 0 12px;
      text-align: center;
    }

    .logo {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -1.5px;
      background: linear-gradient(135deg, #5b4a8a 0%, #2a9d8f 60%, #c97d3a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .subtitle {
      color: var(--text-muted);
      margin-top: 4px;
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* ── Tabs ──────────────────────────────────────────── */
    .tabs {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin: 28px 0 36px;
      background: var(--surface);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      padding: 4px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }

    .tab-btn {
      padding: 10px 26px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 16px var(--accent-glow);
    }

    /* ── Sections ──────────────────────────────────────── */
    .section {
      display: none;
      animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .section.active {
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .section-header .icon {
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 1.3rem;
      background: var(--surface);
      border: 1px solid var(--glass-border);
    }

    .section-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* ── Court Cards ───────────────────────────────────── */
    .courts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }

    .court-card {
      position: relative;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 28px 24px 24px;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .court-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      transition: height 0.3s ease;
    }

    .court-card[data-sport="padel"]::after {
      background: var(--padel);
    }

    .court-card[data-sport="foot"]::after {
      background: var(--foot);
    }

    .court-card:hover {
      transform: translateY(-6px);
      border-color: var(--glass-border-hover);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
    }

    .court-card:hover::after {
      height: 4px;
    }

    .court-card.selected {
      border-color: var(--accent-light);
      box-shadow: 0 0 0 2px var(--accent), 0 16px 50px var(--accent-glow);
    }

    .court-card.selected::after {
      height: 5px;
      background: var(--accent) !important;
    }

    .court-sport-icon {
      font-size: 2rem;
      margin-bottom: 14px;
    }

    .court-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .court-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .court-badge.padel {
      background: var(--padel-bg);
      color: var(--padel);
      border: 1px solid var(--padel-border);
    }

    .court-badge.foot {
      background: var(--foot-bg);
      color: var(--foot);
      border: 1px solid var(--foot-border);
    }

    .court-price {
      margin-top: 16px;
      font-size: 1.6rem;
      font-weight: 800;
    }

    .court-price .unit {
      font-size: 0.78rem;
      font-weight: 400;
      color: var(--text-muted);
      margin-left: 2px;
    }

    .court-cta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 16px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--accent-light);
      opacity: 0;
      transform: translateY(6px);
      transition: all 0.3s ease;
    }

    .court-card:hover .court-cta {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Booking Panel (appears after court selection) ──── */
    .booking-panel {
      margin-top: 28px;
      background: var(--bg2);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 32px;
      animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .panel-court-info {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .panel-court-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      font-size: 1.5rem;
    }

    .panel-court-icon.padel {
      background: var(--padel-bg);
      border: 1px solid var(--padel-border);
    }

    .panel-court-icon.foot {
      background: var(--foot-bg);
      border: 1px solid var(--foot-border);
    }

    .panel-court-name {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .panel-court-sport {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .panel-close {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      background: var(--surface);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .panel-close:hover {
      background: var(--surface-hover);
      color: var(--text);
    }

    /* ── Name input ─────────────────────────────────────── */
    .name-group {
      margin-bottom: 24px;
    }

    .name-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .name-input {
      width: 100%;
      max-width: 400px;
      padding: 12px 16px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .name-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .name-input::placeholder {
      color: var(--text-dim);
    }

    /* ── Date picker row ───────────────────────────────── */
    .date-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .date-group {
      flex: 1;
      min-width: 200px;
    }

    .date-group label {
      display: block;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .date-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.2s;
    }

    .date-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .date-input::-webkit-calendar-picker-indicator {
      cursor: pointer;
    }

    /* ── Time Slots Grid ───────────────────────────────── */
    .slots-section {
      margin-bottom: 28px;
    }

    .slots-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 12px;
    }

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 8px;
    }

    .slot {
      padding: 12px 8px;
      text-align: center;
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
      user-select: none;
    }

    .slot:hover:not(.booked):not(.selected) {
      border-color: var(--glass-border-hover);
      color: var(--text);
      background: var(--surface-hover);
    }

    .slot.selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 2px 12px var(--accent-glow);
      font-weight: 600;
    }

    .slot.booked {
      background: rgba(239, 68, 68, 0.08);
      border-color: rgba(239, 68, 68, 0.2);
      color: rgba(239, 68, 68, 0.5);
      cursor: not-allowed;
      text-decoration: line-through;
    }

    .slot .slot-label {
      font-size: 0.78rem;
      display: block;
    }

    .slot .slot-check {
      display: none;
    }

    .slot.selected .slot-check {
      display: inline;
      margin-left: 4px;
    }

    /* ── Summary & Book Button ─────────────────────────── */
    .booking-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px;
      background: var(--success-bg);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: var(--radius-md);
      margin-bottom: 20px;
      animation: fadeUp 0.3s ease;
    }

    .summary-text {
      font-size: 0.9rem;
      color: var(--success);
      font-weight: 500;
    }

    .summary-detail {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 36px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #5b4a8a, #7b6baa);
      color: #fff;
      box-shadow: 0 4px 20px var(--accent-glow);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    .btn-danger {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 8px 18px;
      font-size: 0.82rem;
    }

    .btn-danger:hover {
      background: rgba(239, 68, 68, 0.2);
    }

    /* ── Bookings List ─────────────────────────────────── */
    .bookings-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .booking-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 22px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      transition: all 0.3s ease;
    }

    .booking-card:hover {
      border-color: var(--glass-border-hover);
    }

    .booking-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .booking-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 1.2rem;
    }

    .booking-icon.padel {
      background: var(--padel-bg);
    }

    .booking-icon.foot {
      background: var(--foot-bg);
    }

    .booking-info h3 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .booking-meta {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .booking-time {
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .booking-person {
      font-size: 0.78rem;
      color: var(--accent-light);
      font-weight: 500;
    }

    .booking-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-badge {
      padding: 5px 14px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-badge.confirmed {
      background: var(--success-bg);
      color: var(--success);
    }

    .status-badge.cancelled {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
    }

    .status-badge.completed {
      background: rgba(107, 114, 128, 0.15);
      color: var(--text-muted);
    }

    /* ── Toast ─────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast {
      padding: 14px 24px;
      border-radius: var(--radius-sm);
      font-size: 0.88rem;
      font-weight: 500;
      color: #fff;
      animation: slideIn 0.35s ease, fadeOut 0.4s ease 3.5s forwards;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
      backdrop-filter: blur(12px);
    }

    .toast.success {
      background: linear-gradient(135deg, rgba(39, 174, 96, 0.95), rgba(42, 157, 143, 0.95));
    }

    .toast.error {
      background: linear-gradient(135deg, rgba(192, 57, 43, 0.95), rgba(176, 44, 34, 0.95));
    }

    .toast.info {
      background: linear-gradient(135deg, rgba(91, 74, 138, 0.95), rgba(123, 107, 170, 0.95));
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(40px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes fadeOut {
      to {
        opacity: 0;
        transform: translateX(40px);
      }
    }

    /* ── Empty ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 0.95rem;
    }

    /* ── Skeleton ───────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-hover) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius);
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    /* ── Admin Link ───────────────────────────────────── */
    .admin-link {
      position: absolute;
      top: 20px;
      right: 24px;
      padding: 8px 16px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 999px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 100;
    }

    .admin-link:hover {
      background: var(--surface-hover);
      color: var(--accent);
      border-color: var(--glass-border-hover);
      transform: translateY(-2px);
    }

    @media (max-width: 640px) {
      .admin-link {
        top: 10px;
        right: 15px;
        font-size: 0.75rem;
        padding: 6px 12px;
      }

      .logo {
        font-size: 1.8rem;
      }

      .booking-card {
        flex-direction: column;
        align-items: flex-start;
      }

      .booking-right {
        align-self: flex-end;
      }

      .booking-panel {
        padding: 24px 18px;
      }

      .slots-grid {
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      }
    }
  </style>
</head>

<body>
  <div class="bg-glow">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <div class="app" style="position: relative;">
    <a href="admin.html" class="admin-link">
      <span>🔑</span> Admin
    </a>
    <header>
      <div class="logo">🏟️ Sport Booking</div>
      <p class="subtitle">Réservez vos terrains de Padel & Football en quelques clics</p>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="courts">🏟️ Terrains</button>
      <button class="tab-btn" data-tab="bookings">📋 Réservations</button>
    </nav>

    <!-- ── Courts + Inline Booking ────────────────────── -->
    <section id="courts" class="section active">
      <div class="section-header">
        <div class="icon">🏸</div>
        <h2>Terrains disponibles</h2>
      </div>
